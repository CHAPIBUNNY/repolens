name: Publish Documentation

on:
  push:
    branches:
      - "**"  # All branches - namespacing prevents conflicts
  workflow_dispatch:  # Manual trigger option

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate and publish documentation
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          REPOLENS_AI_ENABLED: true
          REPOLENS_AI_API_KEY: ${{ secrets.REPOLENS_AI_API_KEY }}
          REPOLENS_AI_BASE_URL: https://api.openai.com/v1
          REPOLENS_AI_MODEL: gpt-4-turbo-preview
          REPOLENS_AI_TEMPERATURE: 0.3
          REPOLENS_AI_MAX_TOKENS: 2000
        run: npx repolens publish
