name: Publish Documentation

on:
  push:
    branches:
      - "**"  # All branches - namespacing prevents conflicts
  workflow_dispatch:  # Manual trigger option

permissions:
  contents: write

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      
      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 22
      
      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install
      
      - name: Run dependency audit
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=moderate || true
          
          # Fail on critical/high vulnerabilities
          AUDIT_RESULT=$(npm audit --audit-level=high --json || echo '{}')
          CRITICAL=$(echo $AUDIT_RESULT | jq -r '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo $AUDIT_RESULT | jq -r '.metadata.vulnerabilities.high // 0')
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Found $CRITICAL critical and $HIGH high severity vulnerabilities"
            exit 1
          else
            echo "✅ No critical or high severity vulnerabilities found"
          fi
      
      - name: Scan for secrets
        run: |
          echo "Scanning for accidentally committed secrets..."
          
          # Check for common secret patterns in code (exclude test fixtures)
          if git grep -E "(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16}|secret_[a-zA-Z0-9]{30,})" -- '*.js' '*.ts' '*.json' '*.yml' '*.yaml' ':!node_modules' ':!.git' ':!tests' 2>/dev/null; then
            echo "❌ Potential secrets found in code!"
            exit 1
          fi
          
          # Check for suspicious environment variable assignments
          if git grep -E "(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*['\"][^'\"]{20,}" -- '*.js' '*.ts' ':!node_modules' ':!.git' 2>/dev/null; then
            echo "⚠️  Warning: Found hardcoded credentials pattern"
          fi
          
          echo "✅ No secrets detected"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 22

      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install

      - name: Run tests
        run: npx vitest run --no-watch --reporter=verbose

  publish:
    needs: [security, test]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      
      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: 22
      
      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install
      
      - name: Generate and publish documentation
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          CONFLUENCE_URL: ${{ secrets.CONFLUENCE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOLENS_AI_ENABLED: true
          REPOLENS_AI_API_KEY: ${{ secrets.REPOLENS_AI_API_KEY }}
          REPOLENS_AI_BASE_URL: https://api.openai.com/v1
          REPOLENS_AI_MODEL: gpt-5-mini
          REPOLENS_AI_MAX_TOKENS: 2000
        run: node bin/repolens.js publish
