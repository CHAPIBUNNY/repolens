configVersion: 1

project:
  name: "RepoLens"
  docs_title_prefix: "RepoLens"

# GitHub repository info (for SVG diagram hosting)
github:
  owner: "CHAPIBUNNY"
  repo: "repolens"

# AI-assisted documentation features
ai:
  enabled: true
  mode: hybrid              # hybrid = deterministic + AI enhancements
  temperature: 0.3          # Lower = more focused (0.0-1.0)
  max_tokens: 2000          # Token limit per request

features:
  executive_summary: true    # Non-technical project overview
  business_domains: true     # Business function descriptions
  architecture_overview: true # Layered technical analysis
  data_flows: true           # How information moves through system
  developer_onboarding: true # Getting started guide
  change_impact: true        # Architecture diff explanations

publishers:
  - markdown
  - notion
  - confluence
  - github_wiki

github_wiki:
  sidebar: true
  footer: true

# Multi-branch publishing with namespaced titles
# All branches publish to Notion, but with [branch-name] suffix to prevent conflicts
# Example: "System Overview [feature-auth]" vs "System Overview" (main)
notion:
  # branches not specified = all branches allowed
  includeBranchInTitle: true  # Automatically adds [branch-name] to non-main branches

scan:
  include:
    - "src/**/*.js"
    - "bin/**/*.js"
    - "tests/**/*.js"
  ignore:
    - "node_modules/**"
    - "dist/**"
    - ".repolens/**"
    - "coverage/**"

module_roots:
  - "src/core"
  - "src/analyzers"
  - "src/ai"
  - "src/docs"
  - "src/publishers"
  - "src/renderers"
  - "src/delivery"
  - "src/utils"

outputs:
  pages:
    # Non-technical documents (AI-generated)
    - key: "executive_summary"
      title: "Executive Summary"
      description: "Non-technical project overview for leadership and stakeholders"
    - key: "business_domains"
      title: "Business Domains"
      description: "What the system does by functional area"
    
    # Mixed-audience documents
    - key: "system_overview"
      title: "System Overview"
      description: "High-level architecture snapshot of RepoLens CLI"
    - key: "developer_onboarding"
      title: "Developer Onboarding"
      description: "Getting started guide for new contributors"
    
    # Technical documents (AI-enhanced or deterministic)
    - key: "architecture_overview"
      title: "Architecture Overview"
      description: "Layered technical analysis of system architecture"
    - key: "data_flows"
      title: "Data Flows"
      description: "How information moves through the RepoLens system"
    - key: "module_catalog"
      title: "Module Catalog"
      description: "Complete inventory of all RepoLens modules"
    - key: "api_surface"
      title: "API Surface"
      description: "Public CLI interface and commands"
    - key: "route_map"
      title: "Command Map"
      description: "CLI command structure"
    - key: "system_map"
      title: "System Map"
      description: "Visual dependency diagram"
    - key: "arch_diff"
      title: "Architecture Diff"
      description: "Changes in repository structure and architecture"
