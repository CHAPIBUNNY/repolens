configVersion: 1

project:
  name: "RepoLens"
  docs_title_prefix: "RepoLens"

# GitHub repository info (for SVG diagram hosting)
github:
  owner: "CHAPIBUNNY"
  repo: "repolens"

publishers:
  - markdown
  - notion

# Multi-branch publishing with namespaced titles
# All branches publish to Notion, but with [branch-name] suffix to prevent conflicts
# Example: "System Overview [feature-auth]" vs "System Overview" (main)
notion:
  # branches not specified = all branches allowed
  includeBranchInTitle: true  # Automatically adds [branch-name] to non-main branches

scan:
  include:
    - "src/**/*.js"
    - "bin/**/*.js"
    - "tests/**/*.js"
  ignore:
    - "node_modules/**"
    - "dist/**"
    - ".repolens/**"
    - "coverage/**"

module_roots:
  - "src/core"
  - "src/publishers"
  - "src/renderers"
  - "src/delivery"
  - "src/utils"

outputs:
  pages:
    - key: "system_overview"
      title: "System Overview"
      description: "High-level architecture snapshot of RepoLens CLI"
    - key: "module_catalog"
      title: "Module Catalog"
      description: "Complete inventory of all RepoLens modules"
    - key: "api_surface"
      title: "API Surface"
      description: "Public CLI interface and commands"
    - key: "route_map"
      title: "Command Map"
      description: "CLI command structure"
    - key: "system_map"
      title: "System Map"
      description: "Visual dependency diagram"
